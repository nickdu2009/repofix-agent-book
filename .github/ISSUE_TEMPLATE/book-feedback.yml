name: 教程反馈
description: 报告无法复现、缺少解释、链接失效或代码与正文不一致。
title: "[Book] "
body:
  - type: input
    id: page
    attributes:
      label: 页面或章节
      description: 请粘贴页面 URL，或填写 chapter-NN。
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: 问题类型
      options:
        - 命令无法复现
        - 正文与代码不一致
        - 概念解释不清
        - 链接或在线练习失效
        - 安全边界有疑问
        - 其他
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: 实际情况
      description: 包含执行命令、关键输出和所用环境；请删除密钥与个人信息。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望情况
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已查看该章的“快速开始”和故障排查。
          required: true
        - label: 输出中不包含 API Key、Token 或其他敏感信息。
          required: true

