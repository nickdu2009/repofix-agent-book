name: Validate RepoFix companion

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: companion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/repofix
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: examples/repofix/services/agent/pyproject.toml

      - name: Run Agent and service tests
        run: make agent-test

      - name: Run deterministic Eval tests
        run: make eval-unit

      - name: Lint Python code
        run: .venv/bin/python -m ruff check fixtures services evals

  go-control:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/repofix
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Run Go control-plane tests
        run: make go-test

      - name: Run Go race detector
        run: make go-race

      - name: Run Fake control-plane E2E
        run: make fake-e2e

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l services/control)"
          test -z "$unformatted" || { echo "$unformatted"; exit 1; }

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/repofix
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: examples/repofix/apps/web/package-lock.json

      - name: Type-check, test, and build Web
        run: make web-test

  contracts-and-fixture:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/repofix
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Validate shared contracts
        run: make contract-test

      - name: Verify fixture starts broken
        run: make fixture-baseline
