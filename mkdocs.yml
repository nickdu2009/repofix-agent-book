site_name: RepoFix AI Agent 实践教程
site_description: 面向 Go 后端工程师的 AI Agent 工程实践教程
site_author: nickdu2009
site_url: https://nickdu2009.github.io/repofix-agent-book/
repo_url: https://github.com/nickdu2009/repofix-agent-book
repo_name: nickdu2009/repofix-agent-book
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 阅读指南:
      - 学习目标与方法: preface/learning-path.md
      - 学习与实现路线图: preface/implementation-status.md
      - 怎样完成一章: preface/chapter-workflow.md
      - 在线语法练习: playgrounds/index.md
  - 第一部分 · 打好工程地基:
      - 系统架构: foundations/architecture.md
      - 仓库与云端工作区: foundations/cloud-workspace.md
      - 第一个缺陷练习仓库: foundations/fixture.md
  - 第二部分 · 手写 Python Agent:
      - Python 基础恢复: agent/python-foundations.md
      - Agent 状态与决策循环: agent/loop-and-state.md
      - 工具系统与安全边界: agent/tools-and-safety.md
  - 第三部分 · 构建可靠运行时:
      - 运行时架构决策: runtime/architecture-decisions.md
      - 跨语言共享契约: runtime/contracts.md
      - Python Agent 服务化: runtime/python-service.md
      - Go 控制平面: runtime/go-control-plane.md
      - Daytona 云沙箱: runtime/daytona-sandbox.md
      - 持久化、恢复与事件: runtime/persistence-and-events.md
  - 第四部分 · 用评测驱动改进:
      - 评测体系: evaluation/evaluation-system.md
      - 上下文选择与失败恢复: evaluation/context-and-recovery.md
  - 第五部分 · 构建 Web 控制台:
      - TypeScript 基础: product/typescript-foundations.md
      - Web 客户端: product/web-console.md
  - 第六部分 · 交付与持续学习:
      - CI、部署与密钥管理: production/ci-and-deployment.md
      - ChatGPT 与 Codex 协作: production/chatgpt-and-codex.md
      - 完成标准与后续方向: production/completion.md
  - 附录:
      - 28 周执行安排: appendix/28-week-plan.md
      - 术语表: appendix/glossary.md
      - 学习检查清单: appendix/checklists.md

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/online-runner.css

extra_javascript:
  - assets/javascripts/python-runner.js

copyright: Copyright &copy; 2026 nickdu2009
